# Deterministic cluster fixtures the E2E specs assert against. Names are
# stable (unlike deployment-managed pod names) so tests can target them
# directly. busybox is tiny, keeping image pulls fast in CI.
apiVersion: v1
kind: Namespace
metadata:
  name: e2e-demo
---
apiVersion: v1
kind: Pod
metadata:
  name: e2e-logger
  namespace: e2e-demo
  labels:
    app: e2e-logger
    # Distinctive value so the pod-detail Labels section can be asserted
    # without colliding with other UI text.
    tier: e2e-fixture-label
spec:
  containers:
    - name: logger
      image: busybox:1.36
      # Emits a known marker line so the logs view has something to assert on.
      command: ["sh", "-c", "while true; do echo E2E_LOG_LINE_MARKER; sleep 2; done"]
---
apiVersion: v1
kind: Pod
metadata:
  name: e2e-multi
  namespace: e2e-demo
  labels:
    app: e2e-multi
spec:
  containers:
    # Each container emits a distinct marker so the logs view can be asserted
    # per-container — this is what actually guards the multi-container log
    # fix (#4/#6): selecting a container must show that container's output.
    - name: main
      image: busybox:1.36
      command: ["sh", "-c", "while true; do echo E2E_MAIN_MARKER; sleep 2; done"]
    - name: sidecar
      image: busybox:1.36
      command: ["sh", "-c", "while true; do echo E2E_SIDECAR_MARKER; sleep 2; done"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: e2e-web
  namespace: e2e-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: e2e-web
  template:
    metadata:
      labels:
        app: e2e-web
    spec:
      containers:
        - name: web
          image: busybox:1.36
          command: ["sh", "-c", "sleep 3600"]
---
apiVersion: v1
kind: Service
metadata:
  name: e2e-svc
  namespace: e2e-demo
spec:
  selector:
    app: e2e-web
  ports:
    - port: 80
      targetPort: 80
