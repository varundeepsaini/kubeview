name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kubeview-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: kubeview-backend/go.mod
          cache-dependency-path: kubeview-backend/go.sum

      - name: Build
        run: go build ./...

      - name: Test (race + coverage)
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

  backend-lint:
    name: Backend lint (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kubeview-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: kubeview-backend/go.mod
          cache-dependency-path: kubeview-backend/go.sum

      - name: go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt needed on the following files:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: latest
          install-go: false
          working-directory: kubeview-backend

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: kubeview-backend
          args: --timeout=5m

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  frontend:
    name: Frontend (Next.js / TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kubeview-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: kubeview-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint -- --max-warnings=0

      - name: Build
        run: npm run build

  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            build-mode: autobuild
          - language: javascript-typescript
            build-mode: none
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended

      - name: Autobuild
        if: matrix.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    # Bound a cluster-creating job so a wedged cluster or a stalled
    # download can't burn hours of runner time.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: kubeview-backend/go.mod
          cache-dependency-path: kubeview-backend/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            kubeview-frontend/package-lock.json
            kubeview-e2e/package-lock.json

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: kubeview-e2e
          # Pin the Kubernetes version so the cluster under test doesn't drift
          # between runs with kind-action releases.
          node_image: kindest/node:v1.34.0

      # Preload the fixture image into the node from the runner's Docker so the
      # kubelet never does an anonymous Docker Hub pull (shared-runner-IP rate
      # limits cause flaky ImagePullBackOff otherwise).
      - name: Preload fixture image
        run: |
          docker pull busybox:1.36
          kind load docker-image busybox:1.36 --name kubeview-e2e

      - name: Apply cluster fixtures
        run: |
          kubectl apply -f kubeview-e2e/fixtures.yaml
          # Recreate the fixture pods so their lifecycle events are freshly
          # generated (Kubernetes GCs events after ~1h; the events specs
          # assert on them). A no-op on a fresh cluster, safe on a reused one.
          kubectl -n e2e-demo delete pod e2e-logger e2e-multi \
            --ignore-not-found --wait=true
          kubectl apply -f kubeview-e2e/fixtures.yaml
          kubectl -n e2e-demo wait --for=condition=Ready \
            pod/e2e-logger pod/e2e-multi --timeout=120s

      # Compile the backend up front so its cold build doesn't ride inside
      # Playwright's webServer health-check window (fail fast on a build error
      # instead of an opaque server-start timeout).
      - name: Warm up backend build
        working-directory: kubeview-backend
        run: go build ./...

      - name: Build frontend
        working-directory: kubeview-frontend
        run: |
          npm ci
          npm run build

      - name: Install E2E dependencies
        working-directory: kubeview-e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      # Playwright's webServer config launches the real Go backend (against the
      # kind cluster) and the standalone frontend, then drives Chromium.
      - name: Run E2E tests
        working-directory: kubeview-e2e
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: kubeview-e2e/playwright-report/
          retention-days: 7
