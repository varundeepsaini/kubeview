apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeview-frontend
  namespace: kubeview
  labels:
    app: kubeview-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubeview-frontend
  template:
    metadata:
      labels:
        app: kubeview-frontend
    spec:
      # The frontend never calls the Kubernetes API, so it needs no token.
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        # Numeric UID of the alpine "node" user — kubelet cannot verify
        # runAsNonRoot against a non-numeric image USER.
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: frontend
          # NEXT_PUBLIC_API_BASE is baked in at image build time and must
          # point at the backend URL reachable from the BROWSER (not the
          # cluster-internal service name) — e.g. the port-forwarded or
          # ingress URL of kubeview-backend.
          image: kubeview-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
          securityContext:
            allowPrivilegeEscalation: false
            # Match the backend's read-only root; Next.js only needs a
            # writable cache directory, mounted below.
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: next-cache
              mountPath: /app/.next/cache
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: next-cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: kubeview-frontend
  namespace: kubeview
  labels:
    app: kubeview-frontend
spec:
  selector:
    app: kubeview-frontend
  ports:
    - name: http
      port: 5500
      targetPort: http
