# Local development stack.
#
# network_mode: host lets the backend reach API servers that bind to
# 127.0.0.1 (kind, minikube, k3d). This is Linux-only; on Docker Desktop
# (macOS/Windows) enable host networking in Settings > Resources > Network,
# or run the backend directly on the host with `go run .`.
#
# KUBECONFIG_HOST points at a single kubeconfig FILE on the host (a
# colon-separated KUBECONFIG list is not supported here — pick one file).
services:
  backend:
    build: ./kubeview-backend
    network_mode: host
    # Compose cannot read the unexported shell $UID/$GID, so these default to
    # 1000 (the first-user default on most Linux desktops). If your uid/gid
    # differ, run: `UID=$(id -u) GID=$(id -g) docker compose up`.
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      KUBECONFIG: /kubeconfig
      CORS_ORIGIN: http://localhost:5500
    volumes:
      - type: bind
        source: ${KUBECONFIG_HOST:-~/.kube/config}
        target: /kubeconfig
        read_only: true
        # Fail loudly if the kubeconfig is missing instead of creating a
        # root-owned directory at its path.
        bind:
          create_host_path: false

  frontend:
    build:
      context: ./kubeview-frontend
      args:
        NEXT_PUBLIC_API_BASE: http://localhost:5501/api
    ports:
      - "5500:3000"
    depends_on:
      - backend
