# Local development stack. The backend runs on the host network so it can
# reach API servers that bind to 127.0.0.1 (kind, minikube, k3d); the
# kubeconfig is mounted read-only.
services:
  backend:
    build: ./kubeview-backend
    network_mode: host # kind/minikube API servers listen on 127.0.0.1
    # Run as your host user so the mounted kubeconfig (usually mode 600)
    # stays readable. Override UID/GID if yours differ.
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      KUBECONFIG: /kubeconfig
      CORS_ORIGIN: http://localhost:5500
    volumes:
      - ${KUBECONFIG:-~/.kube/config}:/kubeconfig:ro

  frontend:
    build:
      context: ./kubeview-frontend
      args:
        NEXT_PUBLIC_API_BASE: http://localhost:5501/api
    ports:
      - "5500:3000"
    depends_on:
      - backend
